<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Solid App</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div
      id="starfield"
      class="starfield"
      style="position: fixed; inset: 0; z-index: 0; pointer-events: none;"
      aria-hidden="true"
    ></div>
    <div id="root"></div>

    <script src="/starfield.js"></script>
    <script>
      Starfield.setup({
        container: document.getElementById("starfield"),
        starColor: "rgb(255, 255, 255)",
        canvasColor: "rgb(0, 0, 0)",
        hueJitter: 0,
        trailLength: 0.45,
        baseSpeed: 1,
        maxAcceleration: 2,
        accelerationRate: 0.05,
        decelerationRate: 0.05,
        minSpawnRadius: 80,
        maxSpawnRadius: 500, 
        auto: false,
      });
    </script>
    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
